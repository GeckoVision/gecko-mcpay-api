# =============================================================================
# secrets-manifest.yml — SINGLE SOURCE OF TRUTH for gecko-api provider creds.
#
# WHY THIS EXISTS (the bug it kills): config drift across THREE artifacts that
# must agree but had no enforced link —
#   1. infra/push-ssm-params.sh  (what we PUSH to SSM Parameter Store)
#   2. infra/ecs-stack.yml       (what the ECS task INJECTS as `secrets:`)
#   3. runtime code              (what each provider READS from env)
# When (1) and (2) disagree, a param lands in SSM but never reaches the
# container — the failure mode that left OKX news dark (PR #150) and that
# silently ran the EVENTS_SECRET HMAC on a dev fallback in prod. This manifest
# is the canonical declaration; the preflight script and the parity drift test
# both READ it so adding/removing a provider touches exactly one place.
#
# SECRET-SAFETY: this file names ENV VARS only. It never holds a secret value.
#
# SCHEMA (per provider under `providers:`):
#   requires:          [str]   env vars that MUST be real (non-sentinel) when enabled
#   enabled_when:      mapping  how to decide the provider is ON. One of:
#                                 {flag: NAME, value: V}    flag==V (case-insensitive)
#                                 {flag: NAME, present: true} flag holds any real value
#                                 always: true               always on (core deps)
#   requires_together: bool    (optional) all `requires` must be set as a SET,
#                              not individually — a partial set is the drift bug
#                              (e.g. OKX key without secret => 401). Default false.
#   requires_any_of:   [str]   (optional) AT LEAST ONE of these must be real
#                              (e.g. Helius OR QuickNode). When present, `requires`
#                              may be empty and this list drives the enabled/DARK call.
#   fail_mode:         enum    open | closed | auth_error
#                                 open       — missing cred => provider silently no-ops
#                                              (fail-OPEN: panel runs without it)
#                                 closed     — missing cred => feature hard-disabled
#                                 auth_error — missing/partial cred => upstream 401/403
#                                              (the dangerous one: looks live, returns [])
#   visibility:        enum    startup_log — surface in the boot provider-status banner
#
# `boot_required:` is a SEPARATE list: every SSM param the ECS task references in
# its `secrets:` ValueFrom block. These MUST exist in SSM (even as a sentinel)
# or the task hits ResourceInitializationError on start. The parity test asserts
# this list == push-ssm-params.sh REQUIRED_AT_BOOT keys == ecs-stack.yml secrets.
# =============================================================================

providers:

  okx_news:
    # OKX V5 HMAC news/sentiment feed for the sentiment_analyst voice.
    # GECKO_NEWS_PROVIDER=okx flips it on. Key+secret are a SET — a key without
    # its secret (or a key issued-with-passphrase missing the passphrase) returns
    # OKX 401, and the adapter fail-OPENs to [] => silent dark wedge. That is the
    # exact PR #150 bug; requires_together makes the partial-set illegal.
    enabled_when: {flag: GECKO_NEWS_PROVIDER, value: okx}
    requires: [OKX_TRADING_API_KEY, OKX_TRADING_SECRET_KEY]
    requires_together: true
    fail_mode: auth_error
    visibility: startup_log

  okx_onchainos:
    # OnchainOS market client (token metrics / top-20 holders / index price).
    # No separate flag — a real OK-ACCESS-KEY in OKX_ONCHAINOS_API_KEY enables it.
    enabled_when: {flag: OKX_ONCHAINOS_API_KEY, present: true}
    requires: [OKX_ONCHAINOS_API_KEY]
    fail_mode: open
    visibility: startup_log

  safety_rpc:
    # Solana RPC for the contract-safety / Information-MEV read. Helius primary
    # (key builds the mainnet RPC URL) OR a full QuickNode RPC URL. At least one
    # must be real or safety_check returns safety_check_unavailable (the wedge
    # signal goes dark). enabled when EITHER is present.
    enabled_when: {flag: HELIUS_API_KEY, present: true}
    requires: []
    requires_any_of: [HELIUS_API_KEY, QUICKNODE_RPC_URL]
    fail_mode: open
    visibility: startup_log

  dune:
    # Dune Analytics aggregate queries (holder-distribution / LP-concentration /
    # wash-trade proxies). Sentinel => client disabled, fail-OPEN.
    enabled_when: {flag: DUNE_API_KEY, present: true}
    requires: [DUNE_API_KEY]
    fail_mode: open
    visibility: startup_log

  voyage_embed:
    # EMBED_PROVIDER=voyage => Voyage embeddings need VOYAGE_API_KEY. Missing key
    # raises ValueError at first embed() call (closed: the feature can't run).
    enabled_when: {flag: EMBED_PROVIDER, value: voyage}
    requires: [VOYAGE_API_KEY]
    fail_mode: closed
    visibility: startup_log

  voyage_rerank:
    # GECKO_RERANKER=voyage => trade-panel cross-encoder reranker needs
    # VOYAGE_API_KEY. Off by default; fail-OPEN (panel falls back to un-reranked
    # retrieval if the key is missing).
    enabled_when: {flag: GECKO_RERANKER, value: voyage}
    requires: [VOYAGE_API_KEY]
    fail_mode: open
    visibility: startup_log

  mongo_chunks:
    # GECKO_CHUNK_STORE=mongo => permanent canon corpus lives in Atlas; needs
    # MONGODB_URI. Missing URI silently degrades chunk reads/writes to no-op
    # (fail-OPEN), which is itself a dark-corpus footgun — surfaced in the banner.
    enabled_when: {flag: GECKO_CHUNK_STORE, value: mongo}
    requires: [MONGODB_URI]
    fail_mode: open
    visibility: startup_log

  cdp:
    # CDP facilitator credentials. Required only when X402_NETWORK=solana-mainnet
    # (or base-mainnet). Sentinels keep ECS booting before mainnet onboarding;
    # both creds are a SET (a key id without its secret can't sign). Without them
    # mainnet settle fails (auth_error). Devnet ignores them.
    enabled_when: {flag: X402_NETWORK, value: solana-mainnet}
    requires: [CDP_API_KEY_ID, CDP_API_KEY_SECRET]
    requires_together: true
    fail_mode: auth_error
    visibility: startup_log

  privy:
    # Privy v2 server-side wallet provisioning. A real app-id+secret PAIR enables
    # the live wallet adapter; sentinels lazy-skip provisioning (fail-OPEN to the
    # stub provider). NOTE: ecs-stack.yml currently pins GECKO_WALLET_PROVIDER=stub
    # regardless, so this is "configured" status only until that pin is removed.
    enabled_when: {flag: PRIVY_APP_ID, present: true}
    requires: [PRIVY_APP_ID, PRIVY_APP_SECRET]
    requires_together: true
    fail_mode: closed
    visibility: startup_log

  twitsh:
    # twit.sh x402 micropayments on Base mainnet. TWITSH_ENABLED=true is the
    # kill-switch; the wallet private key + address are a SET (a half-configured
    # wallet can't sign). Disabled by default; closed when enabled-but-unfunded.
    enabled_when: {flag: TWITSH_ENABLED, value: "true"}
    requires: [TWITSH_WALLET_PRIVATE_KEY, TWITSH_WALLET_ADDRESS]
    requires_together: true
    fail_mode: closed
    visibility: startup_log

  openrouter:
    # Pro-tier debate LLM routing. LLM_ROUTER=openrouter => OPENROUTER_API_KEY is
    # required; sentinel means the pro router can't reach the model (closed).
    enabled_when: {flag: LLM_ROUTER, value: openrouter}
    requires: [OPENROUTER_API_KEY]
    fail_mode: closed
    visibility: startup_log

  supabase:
    # Core session/source store. Always required — the app refuses to do useful
    # work without it. URL + service-role key are a SET.
    enabled_when: {always: true}
    requires: [SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY]
    requires_together: true
    fail_mode: closed
    visibility: startup_log

  tavily:
    # Source discovery for the research pipeline. Always required — gecko-api
    # fails fast at startup without TAVILY_API_KEY (see main.lifespan).
    enabled_when: {always: true}
    requires: [TAVILY_API_KEY]
    fail_mode: closed
    visibility: startup_log

# -----------------------------------------------------------------------------
# boot_required — every SSM param the ECS task resolves at boot via `secrets:`
# ValueFrom. MUST exist in SSM (sentinel ok) or the task fails to start with
# ResourceInitializationError. The parity drift test asserts this set equals
# both push-ssm-params.sh REQUIRED_AT_BOOT and ecs-stack.yml `secrets:` names.
#
# This list is the union of the boot-resolved params. Keep it sorted; adding a
# new `secrets:` entry to ecs-stack.yml means adding it here AND to the push
# script's REQUIRED_AT_BOOT, or the parity test fails.
# -----------------------------------------------------------------------------
boot_required:
  - CDP_API_KEY_ID
  - CDP_API_KEY_SECRET
  - DUNE_API_KEY
  - EMBED_MODEL
  - EMBED_PROVIDER
  - EVENTS_SECRET
  - GECKO_CHUNK_STORE
  - GECKO_NEWS_PROVIDER
  - GECKO_RERANKER
  - GECKO_TRANSCRIPT_STORE
  - HELIUS_API_KEY
  - LLM_ROUTER
  - MONGODB_CHUNK_DB
  - MONGODB_DB
  - MONGODB_URI
  - OKX_API_KEY
  - OKX_NEWS_API_URL
  - OKX_ONCHAINOS_API_KEY
  - OKX_TRADING_API_KEY
  - OKX_TRADING_PASSPHRASE
  - OKX_TRADING_SECRET_KEY
  - OPENROUTER_API_KEY
  - PRIVY_APP_ID
  - PRIVY_APP_SECRET
  - QUICKNODE_RPC_URL
  - TWITSH_BASE_URL
  - TWITSH_ENABLED
  - TWITSH_WALLET_ADDRESS
  - TWITSH_WALLET_PRIVATE_KEY
  - VOYAGE_API_KEY
