[project]
name = "gecko-api"
version = "0.1.0"
description = "FastAPI service for Gecko — wraps gecko-core for the V2 web app at app.geckovision.tech."
requires-python = ">=3.11"
dependencies = [
    "gecko-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-dotenv>=1.0",
]

[project.scripts]
gecko-api = "gecko_api.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gecko_api"]
