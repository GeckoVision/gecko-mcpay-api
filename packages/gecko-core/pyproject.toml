[project]
name = "gecko-core"
version = "0.1.0"
description = "Builder Bootstrap Platform SDK — pure business logic. CLI, MCP, and API import this."
requires-python = ">=3.11"
dependencies = [
    "openai>=1.40",
    "supabase>=2.5",
    "tavily-python>=0.3",
    "httpx>=0.27",
    "youtube-transcript-api>=0.6",
    "tiktoken>=0.7",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "tenacity>=8.5",
    "pyautogen>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gecko_core"]
