<script type="application/json" id="speaker-notes">
[
  "Hey - Ernani and Leticia here, we’re building Gecko Protocol. \nOne line: in creator marketing, the brand cannot cancel, because the code says so. \nWe hold campaign funds in escrow on Solana and release them based on verified real-world data. \nWe're at Colosseum because you can't do this trustlessly without a blockchain.",
  "Creator marketing looks huge from the outside. \nZoom in on how deals actually close, though, and it's all emails, PDFs, and Telegram. \nThree things break: brands ghost creators after the content ships, creators underdeliver and face no consequences, and most deals are too small to sue over. 92% of the time, whoever has more leverage wins. \nThe whole industry runs on trust - and trust doesn't scale.",
  "Most startups attack this with more transparency — a dashboard, a better invoice, another middleman. We think that's the wrong frame. Transparency only tells you something went wrong. Enforceability changes what can happen in the first place. That's the wedge. Lock commitment in code, enforce release onchain, tie payout to predefined conditions — not to a support ticket.\n",
  "Here's the whole product in five moves — live on Solana devnet right now, not a mockup. Brand funds a vault with USDC. Creators get their slice locked in. Content goes live — 10% pays out automatically. Campaign hits its targets — the next chunk unlocks. Deadline passes — leftover money goes home. Nobody presses a button. Nobody signs off. The code runs the deal.\n",
  "Why Solana? Because this only works if the rails are fast, cheap, and programmable. Payouts settle in under half a second — creators feel paid instantly. Fees are fractions of a cent — we can verify campaign data as often as we need. On Ethereum, checking a single milestone would cost more than the milestone itself. And Solana lets the rules of the deal — vaults, splits, deadlines — live in code, not in a contract nobody reads. This isn't payments on a blockchain. It's a campaign primitive that needs Solana.",
  "Global market: $21 billion. The slice where enforcement actually matters — mid-market campaigns — is $4.2 billion. Year one, we're targeting $42 million flowing through the protocol. But TAM slides are cheap. The wedge is what matters. Three beachheads: Trexx — LATAM esports hub, 16 teams, one integration lands 16 rosters. Crypto-native brands — Phantom, Helius, Jupiter — already running creator campaigns, already frustrated with the Web2 detour. And Solana gaming studios running creator programs with measurable outcomes. All three already live onchain. Zero education needed.",
  "Competition. Traditional agencies handle this with invoices and fifteen-to-twenty-five percent take rates — no enforcement. Lever.io does escrow, but they can freeze funds; that's centralized. Lumanu is a dominant Web2 SaaS — great compliance, but any brand can log in and reverse. Influur does onchain payments but on Ethereum — ten times slower, ten times more expensive per transaction, no cliff. Escrow is table stakes. The cliff — payout that can't be reversed once conditions hit — is the moat. Nobody else has it.",
  "Me and Leticia. I build the infra — former Santander and Itaú engineer, shipped and scaled a no-code AI training tool with a founding team. Leticia runs product and pilots — she led open-innovation projects at Liga Ventures for BASF, Saint-Gobain, Sodexo, Mercedes-Benz, and she administers a high-trust Corinthians fan community that gives us a direct distribution channel into football creators. We're raising two-hundred-fifty-K for twelve months of runway — forty to mainnet and audits, thirty-five to three paid pilots, twenty-five to team and ops. The wedge is creator marketing. The destination is bigger — Gecko is the settlement layer for any onchain agreement between a brand and a person. Thanks."
]
</script>
